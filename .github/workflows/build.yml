name: Build Matrix Tetris

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run core tests
        run: ./scripts/test_core.sh

      - name: Package app
        run: ./scripts/package_release.sh

      - name: Upload app zip
        uses: actions/upload-artifact@v4
        with:
          name: MatrixTetris-v1.0.0-macOS
          path: release/MatrixTetris-v1.0.0-macOS.zip
